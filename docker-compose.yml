services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-ksuser}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-kspassword}"
      POSTGRES_DB: "${POSTGRES_DB:-ksplatform}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ksuser} -d ${POSTGRES_DB:-ksplatform}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - miniodata:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000" # S3 API (also the public URL host)
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # MinIO web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job: create the uploads bucket and make it publicly readable.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      S3_BUCKET: "${S3_BUCKET:-ksplatform-uploads}"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing local/\"$$S3_BUCKET\" &&
      mc anonymous set download local/\"$$S3_BUCKET\" &&
      echo \"Bucket $$S3_BUCKET ready (public read).\"
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ksuser}:${POSTGRES_PASSWORD:-kspassword}@postgres:5432/${POSTGRES_DB:-ksplatform}?schema=public"
      # CHANGE THIS in production: openssl rand -base64 32
      AUTH_SECRET: "${AUTH_SECRET:-dev-only-secret-change-me-please-32+chars}"
      AUTH_TRUST_HOST: "true"
      # Optional: email auto-promoted to ADMIN on next login.
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      # The app talks to MinIO over the internal network...
      S3_ENDPOINT: "http://minio:9000"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      S3_BUCKET: "${S3_BUCKET:-ksplatform-uploads}"
      # ...but image URLs must be reachable from the browser.
      S3_PUBLIC_URL: "${S3_PUBLIC_URL:-http://localhost:9000/ksplatform-uploads}"
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  pgdata:
  miniodata:
